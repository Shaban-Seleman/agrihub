spring:
  datasource:
    url: jdbc:h2:mem:samiagrihub;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
app:
  auth:
    jwt-secret: test-secret-test-secret-test-secret
    cookie-secure: false
  otp:
    provider: logging
    enabled: false
    auth-header-name: Authorization
    timeout-millis: 5000
  email:
    provider: logging
    enabled: false
    auth-header-name: Authorization
    timeout-millis: 5000
  seed:
    enabled: false
