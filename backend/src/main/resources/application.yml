spring:
  application:
    name: samiagrihub-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/samiagrihub}
    username: ${DB_USERNAME:samiagrihub}
    password: ${DB_PASSWORD:samiagrihub}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
server:
  servlet:
    context-path: /
app:
  auth:
    jwt-secret: ${APP_JWT_SECRET:change-me-change-me-change-me-change-me}
    access-token-minutes: ${APP_ACCESS_TOKEN_MINUTES:120}
    cookie-name: ${APP_AUTH_COOKIE_NAME:samiagrihub_session}
    cookie-secure: ${APP_AUTH_COOKIE_SECURE:false}
    cookie-same-site: ${APP_AUTH_COOKIE_SAME_SITE:Lax}
  otp:
    provider: ${APP_OTP_PROVIDER:}
    enabled: ${APP_OTP_ENABLED:false}
    base-url: ${APP_OTP_BASE_URL:}
    delivery-path: ${APP_OTP_DELIVERY_PATH:/messages/otp}
    auth-token: ${APP_OTP_AUTH_TOKEN:}
    auth-header-name: ${APP_OTP_AUTH_HEADER_NAME:Authorization}
    sender-id: ${APP_OTP_SENDER_ID:}
    timeout-millis: ${APP_OTP_TIMEOUT_MILLIS:5000}
    ttl-minutes: ${APP_OTP_TTL_MINUTES:10}
    resend-cooldown-seconds: ${APP_OTP_RESEND_COOLDOWN_SECONDS:60}
  email:
    provider: ${APP_EMAIL_PROVIDER:}
    enabled: ${APP_EMAIL_ENABLED:false}
    base-url: ${APP_EMAIL_BASE_URL:}
    delivery-path: ${APP_EMAIL_DELIVERY_PATH:/messages/email}
    auth-token: ${APP_EMAIL_AUTH_TOKEN:}
    auth-header-name: ${APP_EMAIL_AUTH_HEADER_NAME:Authorization}
    from-address: ${APP_EMAIL_FROM_ADDRESS:}
    from-name: ${APP_EMAIL_FROM_NAME:}
    reply-to: ${APP_EMAIL_REPLY_TO:}
    timeout-millis: ${APP_EMAIL_TIMEOUT_MILLIS:5000}
  cors:
    allowed-origin-patterns: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:3000,http://127.0.0.1:3000}
  seed:
    enabled: ${APP_SEED_ENABLED:false}
management:
  endpoints:
    web:
      exposure:
        include: health,info
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
logging:
  pattern:
    level: "%5p [%X{traceId:-}]"
