spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/samiagrihub}
    username: ${DB_USERNAME:samiagrihub}
    password: ${DB_PASSWORD:samiagrihub}
app:
  auth:
    cookie-secure: false
    cookie-same-site: Lax
  otp:
    provider: logging
    enabled: false
    auth-header-name: Authorization
    timeout-millis: 5000
  email:
    provider: logging
    enabled: false
    auth-header-name: Authorization
    timeout-millis: 5000
  cors:
    allowed-origin-patterns: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:3000,http://127.0.0.1:3000,http://192.168.*:3000,http://10.*:3000,http://172.16.*:3000,http://172.17.*:3000,http://172.18.*:3000,http://172.19.*:3000,http://172.20.*:3000,http://172.21.*:3000,http://172.22.*:3000,http://172.23.*:3000,http://172.24.*:3000,http://172.25.*:3000,http://172.26.*:3000,http://172.27.*:3000,http://172.28.*:3000,http://172.29.*:3000,http://172.30.*:3000,http://172.31.*:3000}
  seed:
    enabled: true
logging:
  level:
    com.samiagrihub: DEBUG
